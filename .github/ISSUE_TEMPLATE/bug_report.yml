name: 问题反馈
description: 报告软件 bug 或异常行为
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间反馈问题！请尽量填写完整，方便定位和复现。

  - type: input
    id: version
    attributes:
      label: 软件版本
      description: 关于页面或标题栏显示的版本号
      placeholder: "例：v0.1.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 系统版本
      description: Windows 版本，可在「设置 → 系统 → 关于」查看
      placeholder: "例：Windows 11 23H2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？期望的行为是什么？
      placeholder: |
        【实际行为】按下触发键后连发没有反应
        【期望行为】应当持续发送目标键
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 怎么稳定触发这个问题？
      placeholder: |
        1. 新建规则，触发键设置为 F1，目标键设置为 A
        2. 在游戏中按住 F1
        3. 游戏内无任何反应
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 出现频率
      options:
        - 必现（每次都会触发）
        - 偶现（大约 __ 次出现一次）
        - 仅出现过一次
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 游戏名称、截图、日志文件等，有助于定位问题
      placeholder: |
        游戏：xxx
        日志路径：%APPDATA%\com.flair-bloom\logs\

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issues，没有相同问题
          required: true
        - label: 我已升级到最新版本仍然存在此问题
          required: true
