name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/main/src-tauri -> target

      - name: Install dependencies
        run: pnpm install

      - name: Check signing secret
        shell: pwsh
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ($env:KEY) { Write-Host "TAURI_SIGNING_PRIVATE_KEY is SET (length=$($env:KEY.Length))" }
          else { Write-Host "TAURI_SIGNING_PRIVATE_KEY is EMPTY or NOT SET" }

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/main
          tagName: ${{ github.ref_name }}
          releaseName: FlairBloom ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
