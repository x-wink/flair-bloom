name: Coverage

on:
  pull_request:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: 共享 crate 覆盖率 + 阈值校验
        run: |
          cargo llvm-cov \
            --package qzh-format \
            --package qzh-profile \
            --package crypto \
            --package migrate \
            --lcov --output-path coverage.lcov \
            --fail-under-lines 85 \
            --fail-under-functions 80 \
            --fail-under-regions 85 \
            --summary-only

      - name: 上传 lcov 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          retention-days: 14
